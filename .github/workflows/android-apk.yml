name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'android/**'
      - 'public/**'
      - 'index.html'
      - 'package.json'
      - 'capacitor.config.json'
      - '.github/workflows/android-apk.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: npm ci

      - name: Build web app (points API at Vercel)
        run: npm run build
        env:
          VITE_API_BASE: https://summary-coral-gamma.vercel.app

      - name: Sync web assets into Android project
        run: npx cap sync android

      - name: Build debug APK
        run: ./gradlew assembleDebug
        working-directory: android

      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk SummAI.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: SummAI-apk
          path: SummAI.apk

      - name: Publish APK as latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-latest
          name: 'SummAI Android APK (אחרון)'
          body: 'הורידי את SummAI.apk והתקיני במכשיר האנדרואיד (יש לאשר התקנה ממקור לא מוכר).'
          files: SummAI.apk
